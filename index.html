<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortal Kombat 1 - The Tournament Begins</title>
    
    <link rel="icon" type="image/png" href="https://assets.gqindia.com/photos/602b9e69de64e79204013149/1:1/w_1080,h_1080,c_limit/Mortal%20Kombat.jpg">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Orbitron:wght@700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            background-image: 
                radial-gradient(circle at 50% 20%, rgba(255, 68, 0, 0.15) 0%, transparent 50%),
                linear-gradient(rgba(18, 18, 18, 0.95), rgba(0, 0, 0, 0.98));
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        .logo {
            max-width: 320px;
            width: 100%;
            height: auto;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(255, 68, 0, 0.8));
            animation: pulse 2s infinite alternate;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px #ff4400, 0 0 20px #ff4400, 0 0 30px #ff0000;
            margin-top: 10px;
        }

        .subtitle {
            font-family: 'Permanent Marker', cursive;
            color: #ffcc00;
            font-size: 1.5rem;
            letter-spacing: 2px;
            transform: rotate(-2deg);
            margin-top: 5px;
            text-shadow: 2px 2px #000;
        }

        /* Responsive Video Container for Embedded Player */
        .video-container {
            width: 100%;
            max-width: 960px;
            background-color: #000;
            border: 4px solid #333;
            border-image: linear-gradient(to bottom right, #ff4400, #ffcc00, #333) 1;
            box-shadow: 0 0 35px rgba(255, 68, 0, 0.4);
            position: relative;
            margin-bottom: 40px;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Fight Arena Layout Details */
        .arena-details {
            max-width: 960px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
            padding: 25px;
            border-radius: 4px;
            border-top: 3px solid #ff4400;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .box {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border: 1px solid #222;
        }

        .box h2 {
            font-family: 'Orbitron', sans-serif;
            color: #ffcc00;
            font-size: 1.2rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 1px solid #ff4400;
            padding-bottom: 5px;
        }

        .fighter-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            color: #ff4400;
            font-weight: bold;
        }

        .fighter-list li::before {
            content: "⚡ ";
        }

        .hype-text {
            color: #ccc;
            line-height: 1.6;
            font-style: italic;
        }

        /* Animations */
        @keyframes pulse {
            0% { filter: drop-shadow(0 0 15px rgba(255, 68, 0, 0.7)); transform: scale(1); }
            100% { filter: drop-shadow(0 0 25px rgba(255, 102, 0, 1)); transform: scale(1.02); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .arena-details { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://logos-world.net/wp-content/uploads/2020/11/Mortal-Kombat-Logo.png" alt="Mortal Kombat Logo" class="logo">
        <h1>Mortal Kombat</h1>
        <div class="subtitle">TEST YOUR MIGHT!</div>
    </header>

    <main class="video-container">
        <iframe src="https://drive.google.com/file/d/1r8p04aWR0wAqJ1Hnq48yXxVSNPVXXBYG/preview" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
        </iframe>
    </main>

    <section class="arena-details">
        <div class="box">
            <h2>Select Your Fighter</h2>
            <ul class="fighter-list">
                <li>Liu Kang</li>
                <li>Johnny Cage</li>
                <li>Sonya Blade</li>
                <li>Sub-Zero</li>
                <li>Scorpion</li>
                <li>Raiden</li>
            </ul>
        </div>
        <div class="box">
            <h2>Kombat Zone</h2>
            <p class="hype-text">Turn down the lights, pump up the volume, and get ready for the ultimate cinematic tournament. A flawless victory awaits. Excellent!</p>
        </div>
    </section>

</body>
</html>
