<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortal Kombat (2021) - Stream</title>
    
    <link rel="icon" type="image/png" href="https://assets.gqindia.com/photos/602b9e69de64e79204013149/1:1/w_1080,h_1080,c_limit/Mortal%20Kombat.jpg">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Orbitron:wght@700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            background-image: 
                radial-gradient(circle at 50% 20%, rgba(255, 68, 0, 0.15) 0%, transparent 50%),
                linear-gradient(rgba(18, 18, 18, 0.95), rgba(0, 0, 0, 0.98));
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out;
        }

        .logo {
            max-width: 320px;
            width: 100%;
            height: auto;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(255, 68, 0, 0.8));
            animation: pulse 2s infinite alternate;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px #ff4400, 0 0 20px #ff4400, 0 0 30px #ff0000;
            margin-top: 10px;
        }

        .subtitle {
            font-family: 'Permanent Marker', cursive;
            color: #ffcc00;
            font-size: 1.5rem;
            letter-spacing: 2px;
            transform: rotate(-2deg);
            margin-top: 5px;
            text-shadow: 2px 2px #000;
        }

        /* FIXED LANDSCAPE VIDEO CONTAINER */
        .video-container {
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16 / 9; /* Forces a landscape shape */
            background-color: #000;
            border: 4px solid #333;
            border-image: linear-gradient(to bottom right, #ff4400, #ffcc00, #333) 1;
            box-shadow: 0 0 35px rgba(255, 68, 0, 0.4);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps widescreen formatting without stretching */
            display: block;
        }

        /* FIGHTER SELECT CONTAINER */
        .character-select-area {
            max-width: 960px;
            width: 100%;
            background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
            padding: 25px;
            border-radius: 4px;
            border-top: 3px solid #ff4400;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            text-align: center;
        }

        .character-select-area h2 {
            font-family: 'Orbitron', sans-serif;
            color: #ffcc00;
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* Grid for buttons */
        .fighter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .fighter-btn {
            background: #222;
            color: #ff4400;
            border: 2px solid #444;
            padding: 12px 5px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .fighter-btn:hover {
            background: #ff4400;
            color: #fff;
            border-color: #ffcc00;
            box-shadow: 0 0 10px rgba(255, 68, 0, 0.6);
            transform: translateY(-2px);
        }

        .fighter-btn.active {
            background: #ffcc00;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.8);
        }

        /* Selection Output Box */
        .selection-display {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 2px 2px #000;
            min-height: 40px;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* Animations */
        @keyframes pulse {
            0% { filter: drop-shadow(0 0 15px rgba(255, 68, 0, 0.7)); transform: scale(1); }
            100% { filter: drop-shadow(0 0 25px rgba(255, 102, 0, 1)); transform: scale(1.02); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://logos-world.net/wp-content/uploads/2020/11/Mortal-Kombat-Logo.png" alt="Mortal Kombat Logo" class="logo">
        <h1>Mortal Kombat</h1>
        <div class="subtitle">GET OVER HERE!</div>
    </header>

    <main class="video-container">
        <video controls>
            <source src="https://archive.org/download/mortal-kombat-bluray-1080p/Mortal%20Kombat%20-%20Bluray-1080p.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </main>

    <section class="character-select-area">
        <h2>Choose Your Fighter</h2>
        
        <div class="fighter-grid">
            <button class="fighter-btn" onclick="selectFighter('Cole Young')">Cole Young</button>
            <button class="fighter-btn" onclick="selectFighter('Scorpion')">Scorpion</button>
            <button class="fighter-btn" onclick="selectFighter('Sub-Zero')">Sub-Zero</button>
            <button class="fighter-btn" onclick="selectFighter('Liu Kang')">Liu Kang</button>
            <button class="fighter-btn" onclick="selectFighter('Kung Lao')">Kung Lao</button>
            <button class="fighter-btn" onclick="selectFighter('Sonya Blade')">Sonya Blade</button>
            <button class="fighter-btn" onclick="selectFighter('Jax')">Jax</button>
            <button class="fighter-btn" onclick="selectFighter('Kano')">Kano</button>
        </div>

        <div class="selection-display" id="chosenFighter">Select a Kombatant...</div>
    </section>

    <script>
        function selectFighter(name) {
            // Update Text Display
            document.getElementById('chosenFighter').innerText = name + " Selected!";
            
            // Toggle Visual Button Highlights
            const buttons = document.querySelectorAll('.fighter-btn');
            buttons.forEach(btn => {
                if(btn.innerText === name.toUpperCase()) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
    </script>

</body>
</html>
